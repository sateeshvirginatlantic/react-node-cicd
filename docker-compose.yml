version: '3'

services:
  backend:
    build: ./backend
    container_name: node-backend
    ports:
      - "5000:5000"
    networks:
      - app_network

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network: